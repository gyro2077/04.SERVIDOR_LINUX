<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor - RESTful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">RESTful Converter</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${session.USER}"></span>
                <a class="btn btn-outline-light btn-sm" th:href="@{/auth/logout}">Salir</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Conversion de Unidades</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${conversion.successMessage}" class="alert alert-success" role="alert">
                            <span th:text="${conversion.successMessage}"></span>
                        </div>
                        
                        <div th:if="${conversion.errorMessage}" class="alert alert-danger" role="alert">
                            <span th:text="${conversion.errorMessage}"></span>
                        </div>
                        
                        <form th:action="@{/conversion}" th:object="${conversion}" method="post">
                            <div class="mb-3">
                                <label for="category" class="form-label">Categoria</label>
                                <select class="form-select" id="category" th:field="*{category}">
                                    <option value="Mass">Masa</option>
                                    <option value="Length">Longitud</option>
                                    <option value="Temperature">Temperatura</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="inputValue" class="form-label">Valor</label>
                                <input type="number" step="any" class="form-control" id="inputValue" 
                                       th:field="*{inputValue}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="fromUnit" class="form-label">De</label>
                                <select class="form-select" id="fromUnit" th:field="*{fromUnit}">
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="toUnit" class="form-label">A</label>
                                <select class="form-select" id="toUnit" th:field="*{toUnit}">
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Convertir</button>
                        </form>
                        
                        <div th:if="${conversion.resultValue != null}" class="mt-4 text-center">
                            <h5 class="text-success">Resultado:</h5>
                            <h3 th:text="${conversion.resultValue}"></h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/conversion.js}"></script>
    <script th:inline="javascript">
        const initialCategory = /*[[${conversion.category}]]*/ 'Mass';
        const initialFromUnit = /*[[${conversion.fromUnit}]]*/ 'KILOGRAM';
        const initialToUnit = /*[[${conversion.toUnit}]]*/ 'POUND';
        updateUnits(initialCategory, initialFromUnit, initialToUnit);
    </script>
</body>
</html>
